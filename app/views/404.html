<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      max-width: 500px;
    }

    h1 {
      font-size: 120px;
      margin: 0;
      font-weight: bold;
    }

    h2 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      padding: 12px 25px;
      background: #ff4b2b;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }

    a:hover {
      background: #ff1e00;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you are looking for doesn’t exist or has been moved.</p>
    <a href="#!/">Go Back Home</a>
  </div>

</body>
</html>
