<div class="register-page">
    <div class="register-container">

        <div class="register-card">

            <div class="logo-section">
                <img src="/app/assets/img/sea-7415664_640.jpg" alt="Logo" class="logo">
                <h2>Create Account</h2>
                <p>Join us today and start shopping</p>
            </div>
            <form name="registerForm" ng-submit="register(registerForm)" novalidate>
                <div class="error" ng-if="error">{{error}}</div>
                <div class="success" ng-if="success">{{success}}</div>
                <div class="input-group">
                    <input type="text" name="name" ng-model="user.name" placeholder="Full Name" required>
                    <p class="validation" ng-if="registerForm.$submitted && registerForm.name.$error.required">
                        Name is required
                    </p>
                </div>
       
                <div class="input-group">
                    <input type="tel" name="phone" ng-model="user.phone" placeholder="Phone Number" required>
                    <p class="validation" ng-if="registerForm.$submitted && registerForm.phone.$error.required">
                        Phone number is required
                    </p>
                </div>
                <div class="input-group">
                    <input type="email" name="email" ng-model="user.email" placeholder="Email Address" required>
                    <p class="validation" ng-if="registerForm.$submitted && registerForm.email.$error.required">
                        Email is required
                    </p>
                </div>
                <div class="input-group">
                    <input type="password" name="password" ng-model="user.password" placeholder="Password" required>
                    <p class="validation" ng-if="registerForm.$submitted && registerForm.password.$error.required">
                        Password is required
                    </p>
                </div>
                <button type="submit" class="register-btn">
                    Create Account
                </button>

                <p class="bottom-text">
                    Already have an account?
                    <a href="#!/login">Login</a>
                </p>

            </form>

        </div>

    </div>
</div>
